openapi: 3.0.0
info:
  title: Smart Parking API - Reports
  version: 1.0.0
paths:
  /reports/traffic:
    get:
      summary: Báo cáo lượt xe vào/ra (FR-6.1)
      description: |
        Thống kê số lượt xe vào/ra bãi xe theo ngày, tuần hoặc tháng.
        Hỗ trợ lọc theo bãi xe, tầng, loại xe và khoảng thời gian.
        
        **Quyền truy cập (SRS 3.6):** Chỉ Admin và Manager được xem báo cáo.
      tags: [Reports]
      security:
        - bearerAuth: []
      parameters:
        - name: facilityId
          in: query
          required: false
          schema:
            type: string
            example: "683f1a2b3c4d5e6f7a8b9c0d"
          description: MongoDB ObjectId của bãi xe (lọc theo bãi)
        - name: floorId
          in: query
          required: false
          schema:
            type: string
            example: "683f1a2b3c4d5e6f7a8b9c02"
          description: MongoDB ObjectId của tầng (lọc theo tầng)
        - name: vehicleTypeId
          in: query
          required: false
          schema:
            type: string
            example: "683f1a2b3c4d5e6f7a8b9c01"
          description: MongoDB ObjectId của loại phương tiện
        - name: startDate
          in: query
          required: false
          schema:
            type: string
            format: date
            example: "2026-05-01"
          description: Ngày bắt đầu (ISO date, bao gồm)
        - name: endDate
          in: query
          required: false
          schema:
            type: string
            format: date
            example: "2026-05-31"
          description: Ngày kết thúc (ISO date, bao gồm)
        - name: groupBy
          in: query
          required: false
          schema:
            type: string
            enum: [day, week, month]
            default: day
          description: Nhóm dữ liệu theo ngày/tuần/tháng
      responses:
        '200':
          description: Báo cáo lượt xe vào/ra thành công
          content:
            application/json:
              example:
                success: true
                data:
                  groupBy: "day"
                  summary:
                    totalCheckIn: 245
                    totalCheckOut: 230
                    currentlyParked: 15
                  data:
                    - label: "2026-05-01"
                      checkIn: 85
                      checkOut: 78
                    - label: "2026-05-02"
                      checkIn: 92
                      checkOut: 88
                    - label: "2026-05-03"
                      checkIn: 68
                      checkOut: 64
        '401':
          description: Chưa đăng nhập
          content:
            application/json:
              example:
                success: false
                message: "No token provided or invalid format"
        '403':
          description: Không có quyền xem báo cáo
          content:
            application/json:
              example:
                success: false
                message: "Forbidden: Missing permission 'report:traffic'"

  /reports/revenue:
    get:
      summary: Báo cáo doanh thu (FR-6.2)
      description: |
        Thống kê doanh thu gửi xe theo ngày, tuần hoặc tháng.
        Bao gồm phân tích doanh thu theo phương thức thanh toán và loại phương tiện.
        
        **Quyền truy cập (SRS 3.6):** Chỉ Admin và Manager được xem báo cáo doanh thu.
      tags: [Reports]
      security:
        - bearerAuth: []
      parameters:
        - name: facilityId
          in: query
          required: false
          schema:
            type: string
            example: "683f1a2b3c4d5e6f7a8b9c0d"
          description: MongoDB ObjectId của bãi xe
        - name: vehicleTypeId
          in: query
          required: false
          schema:
            type: string
            example: "683f1a2b3c4d5e6f7a8b9c01"
          description: MongoDB ObjectId của loại phương tiện
        - name: paymentMethod
          in: query
          required: false
          schema:
            type: string
            enum: [cash, qr_pay, e_wallet, bank_card]
          description: Lọc theo phương thức thanh toán
        - name: startDate
          in: query
          required: false
          schema:
            type: string
            format: date
            example: "2026-05-01"
          description: Ngày bắt đầu (ISO date)
        - name: endDate
          in: query
          required: false
          schema:
            type: string
            format: date
            example: "2026-05-31"
          description: Ngày kết thúc (ISO date)
        - name: groupBy
          in: query
          required: false
          schema:
            type: string
            enum: [day, week, month]
            default: day
          description: Nhóm dữ liệu theo ngày/tuần/tháng
      responses:
        '200':
          description: Báo cáo doanh thu thành công
          content:
            application/json:
              example:
                success: true
                data:
                  groupBy: "day"
                  summary:
                    grandTotal: 12500000
                    totalTransactions: 245
                    avgRevenuePerDay: 4166667
                  byTimePeriod:
                    - label: "2026-05-01"
                      totalRevenue: 4200000
                      transactionCount: 85
                      avgRevenue: 49412
                    - label: "2026-05-02"
                      totalRevenue: 4600000
                      transactionCount: 92
                      avgRevenue: 50000
                    - label: "2026-05-03"
                      totalRevenue: 3700000
                      transactionCount: 68
                      avgRevenue: 54412
                  byMethod:
                    - method: "cash"
                      totalRevenue: 7500000
                      count: 150
                    - method: "qr_pay"
                      totalRevenue: 3200000
                      count: 60
                    - method: "e_wallet"
                      totalRevenue: 1400000
                      count: 28
                    - method: "bank_card"
                      totalRevenue: 400000
                      count: 7
                  byVehicleType:
                    - vehicleTypeId: "683f1a2b3c4d5e6f7a8b9c01"
                      vehicleTypeName: "Xe Máy"
                      totalRevenue: 3800000
                      count: 160
                    - vehicleTypeId: "683f1a2b3c4d5e6f7a8b9c02"
                      vehicleTypeName: "Ô Tô"
                      totalRevenue: 8700000
                      count: 85
        '401':
          description: Chưa đăng nhập
          content:
            application/json:
              example:
                success: false
                message: "No token provided or invalid format"
        '403':
          description: Không có quyền xem báo cáo doanh thu
          content:
            application/json:
              example:
                success: false
                message: "Forbidden: Missing permission 'report:revenue'"

  /reports/occupancy:
    get:
      summary: Báo cáo tỷ lệ lấp đầy (FR-6.3)
      description: |
        Tính toán tỷ lệ lấp đầy (occupied/total) realtime theo từng tầng.
        Bao gồm effective occupancy (occupied + reserved) / total — theo mô hình Reservation-Aware Capacity [P10].

        **Quyền truy cập (SRS 3.6):** Chỉ Admin và Manager được xem báo cáo.
      tags: [Reports]
      security:
        - bearerAuth: []
      parameters:
        - name: facilityId
          in: query
          required: false
          schema:
            type: string
            example: "683f1a2b3c4d5e6f7a8b9c0d"
          description: MongoDB ObjectId của bãi xe (lọc theo bãi)
        - name: vehicleTypeId
          in: query
          required: false
          schema:
            type: string
            example: "683f1a2b3c4d5e6f7a8b9c01"
          description: MongoDB ObjectId của loại phương tiện (lọc theo loại xe)
      responses:
        '200':
          description: Báo cáo tỷ lệ lấp đầy theo tầng
          content:
            application/json:
              example:
                success: true
                data:
                  summary:
