                      facilityId: "683f1a2b3c4d5e6f7a8b9c0d"
                      facilityName: "Central Hub Parking"
                      total: 200
                      occupied: 120
                      reserved: 10
                      available: 65
                      maintenance: 5
                      locked: 0
                      occupancyRate: 60
                      effectiveOccupancy: 65
                    - floorId: "683f1a2b3c4d5e6f7a8b9c04"
