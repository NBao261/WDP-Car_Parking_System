        Xác định các khung giờ có lượng xe vào/ra nhiều nhất trong ngày.
        Trả về phân bố hoạt động theo 24 giờ và danh sách top 3 giờ cao điểm.

        **Quyền truy cập (SRS 3.6):** Chỉ Admin và Manager được xem báo cáo.
      tags: [Reports]
      security:
        - bearerAuth: []
      parameters:
        - name: facilityId
          in: query
          required: false
          schema:
            type: string
            example: "683f1a2b3c4d5e6f7a8b9c0d"
          description: MongoDB ObjectId của bãi xe
        - name: vehicleTypeId
          in: query
          required: false
          schema:
            type: string
            example: "683f1a2b3c4d5e6f7a8b9c01"
