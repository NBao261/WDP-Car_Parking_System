openapi: 3.0.0
info:
  title: Smart Parking API - Vehicle Types
  version: 1.0.0
paths:
  /vehicle-types:
    get:
      summary: Get all vehicle types
      tags: [VehicleTypes]
      responses:
        '200':
          description: OK
          content:
            application/json:
              example:
                success: true
                data: {}
    post:
      summary: Create a vehicle type
      tags: [VehicleTypes]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  example: "Xe Máy"
                code:
                  type: string
                  example: "MOTO"
                slotSize:
                  type: string
                  example: "small"
                icon:
                  type: string
                  example: "🏍️"
      responses:
        '201':
          description: Created
          content:
            application/json:
              example:
                success: true
                data: {}

  /vehicle-types/{id}:
    get:
      summary: Get vehicle type by ID
      tags: [VehicleTypes]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            example: "60b9b0b9e6b3f3b3b4f3b3b6"
      responses:
        '200':
          description: OK
          content:
            application/json:
              example:
                success: true
                data: {}
    patch:
      summary: Update vehicle type
      tags: [VehicleTypes]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            example: "60b9b0b9e6b3f3b3b4f3b3b6"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  example: "Xe Máy Cỡ Lớn"
                code:
                  type: string
                  example: "MOTO_LARGE"
                slotSize:
                  type: string
                  example: "medium"
                icon:
                  type: string
                  example: "🏍️"
      responses:
        '200':
          description: OK
          content:
            application/json:
              example:
                success: true
                data: {}
    delete:
      summary: Soft delete vehicle type
      tags: [VehicleTypes]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              example:
                success: true
                data: {}
