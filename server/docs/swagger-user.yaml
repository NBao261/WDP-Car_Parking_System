openapi: 3.0.0
info:
  title: Smart Parking API - Users
  version: 1.0.0
paths:
  /users/me:
    get:
      summary: Lấy profile cá nhân (FR-18.6)
      description: |
        Trả về thông tin profile của user đang đăng nhập.
        Đặc biệt hữu ích cho Staff: response kèm danh sách `assignedFacilities` đã populated
        để frontend hiển thị màn hình chọn tòa nhà sau login.
      tags: [Users]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Profile user kèm assignedFacilities
          content:
            application/json:
              example:
                success: true
                data:
                  _id: "60b9b0b9e6b3f3b3b4f3b3b5"
                  name: "Nguyen Van B"
                  email: "staff@smartparking.com"
                  phone: "0909876543"
                  role: "staff"
                  status: "active"
                  assignedFacilities:
                    - _id: "683f1a2b3c4d5e6f7a8b9c0d"
                      name: "Central Hub Parking"
                      address: "123 Main Street, District 1, HCMC"
                      status: "active"
                      openTime: "06:00"
                      closeTime: "22:00"
                    - _id: "683f1a2b3c4d5e6f7a8b9c0e"
                      name: "South Gate Parking"
                      address: "456 Le Van Sy, District 3, HCMC"
                      status: "active"
                      openTime: "07:00"
                      closeTime: "23:00"
        '401':
          description: Chưa xác thực
          content:
            application/json:
              example:
                success: false
                message: "Unauthorized"

  /users:
    get:
      summary: Get all users
      tags: [Users]
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            default: 10
        - in: query
          name: role
          schema:
            type: string
        - in: query
          name: status
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              example:
                success: true
                data:
                  - _id: "60b9b0b9e6b3f3b3b4f3b3b5"
                    name: "Nguyen Van B"
                    email: "nguyenvanb@example.com"
                    phone: "0909876543"
                    role: "staff"
                    status: "active"
                pagination:
                  page: 1
                  limit: 10
                  total: 1
    post:
      summary: Create a user
      tags: [Users]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  example: "Nguyen Van B"
                email:
                  type: string
                  example: "nguyenvanb@example.com"
                phone:
                  type: string
                  example: "0909876543"
                password:
                  type: string
                  example: "smartparking123"
                role:
                  type: string
                  example: "staff"
      responses:
        '201':
          description: Created
          content:
            application/json:
              example:
                success: true
                data:
                  _id: "60b9b0b9e6b3f3b3b4f3b3b5"
                  name: "Nguyen Van B"
                  email: "nguyenvanb@example.com"
                  phone: "0909876543"
                  role: "staff"
                  status: "active"

  /users/{id}:
    get:
      summary: Get user by ID
      tags: [Users]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            example: "60b9b0b9e6b3f3b3b4f3b3b5"
      responses:
        '200':
          description: OK
          content:
            application/json:
              example:
                success: true
                data:
                  _id: "60b9b0b9e6b3f3b3b4f3b3b5"
                  name: "Nguyen Van B"
                  email: "nguyenvanb@example.com"
                  phone: "0909876543"
                  role: "staff"
                  status: "active"
    patch:
      summary: Update user
      tags: [Users]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            example: "60b9b0b9e6b3f3b3b4f3b3b5"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  example: "Nguyen Van B Updated"
                phone:
                  type: string
                  example: "0909876544"
                status:
                  type: string
                  example: "active"
      responses:
        '200':
          description: OK
          content:
            application/json:
              example:
                success: true
                data:
                  _id: "60b9b0b9e6b3f3b3b4f3b3b5"
                  name: "Nguyen Van B Updated"
                  email: "nguyenvanb@example.com"
                  phone: "0909876544"
                  role: "staff"
                  status: "active"
    delete:
      summary: Soft delete user
      description: |
        Xóa mềm user (isDeleted + status = inactive). Chỉ Admin.
        Two-way sync: tự động xóa user._id khỏi `ParkingFacility.assignedUsers[]`.
      tags: [Users]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              example:
                success: true
                message: "User deleted successfully"

  /users/{id}/lock:
    post:
      summary: Lock user account
      description: Khóa tài khoản user. Chỉ Admin.
      tags: [Users]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            example: "60b9b0b9e6b3f3b3b4f3b3b5"
      responses:
        '200':
          description: OK
          content:
            application/json:
              example:
                success: true
                data:
                  _id: "60b9b0b9e6b3f3b3b4f3b3b5"
                  name: "Nguyen Van B"
                  status: "locked"

  /users/{id}/unlock:
    post:
      summary: Unlock user account
      description: Mở khóa tài khoản user. Reset failedLoginAttempts và lockedUntil. Chỉ Admin.
      tags: [Users]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            example: "60b9b0b9e6b3f3b3b4f3b3b5"
      responses:
        '200':
          description: OK
          content:
            application/json:
              example:
                success: true
                data:
                  _id: "60b9b0b9e6b3f3b3b4f3b3b5"
                  name: "Nguyen Van B"
                  status: "active"

  /users/{id}/reset-password:
    patch:
      summary: Reset user password
      tags: [Users]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            example: "60b9b0b9e6b3f3b3b4f3b3b5"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                newPassword:
                  type: string
                  example: "smartparking123"
      responses:
        '200':
          description: OK
          content:
            application/json:
              example:
                success: true
                data: {}

  /users/{id}/assign-facilities:
    patch:
      summary: Manager phân công tòa nhà cho Staff (FR-18.6)
      description: |
        Cho phép Admin hoặc Manager gán danh sách bãi xe vào tài khoản Staff.
        Sau khi phân công, Staff chỉ có thể check-in/check-out tại các bãi đã được phân công.
        Gửi mảng rỗng `[]` để xóa tất cả phân công.

        **Business rules:**
        - Target user phải có role = `staff` (không cho assign facility cho Admin/Manager).
        - Manager chỉ được assign facility mà chính mình đang được gán (scope giới hạn).
        - Admin có thể assign bất kỳ facility nào.

        **Permission:** `user:assign_facility` (Admin + Manager đều có).

        **Two-way sync:** Khi gán/xóa facility cho user, hệ thống tự động đồng bộ
        `ParkingFacility.assignedUsers[]` ↔ `User.assignedFacilities[]` cả 2 chiều.
      tags: [Users]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            example: "60b9b0b9e6b3f3b3b4f3b3b5"
          description: MongoDB ObjectId của Staff
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [facilityIds]
              properties:
                facilityIds:
                  type: array
                  items:
                    type: string
                  description: Danh sách MongoDB ObjectId của các bãi xe
                  example:
                    - "683f1a2b3c4d5e6f7a8b9c0d"
                    - "683f1a2b3c4d5e6f7a8b9c0e"
            example:
              facilityIds:
                - "683f1a2b3c4d5e6f7a8b9c0d"
                - "683f1a2b3c4d5e6f7a8b9c0e"
      responses:
        '200':
          description: Phân công thành công
          content:
            application/json:
              example:
                success: true
                data:
                  _id: "60b9b0b9e6b3f3b3b4f3b3b5"
                  name: "Nguyen Van B"
                  email: "staff@smartparking.com"
                  role: "staff"
                  assignedFacilities:
                    - _id: "683f1a2b3c4d5e6f7a8b9c0d"
                      name: "Central Hub Parking"
                      address: "123 Main Street, District 1, HCMC"
                      status: "active"
                    - _id: "683f1a2b3c4d5e6f7a8b9c0e"
                      name: "South Gate Parking"
                      address: "456 Le Van Sy, District 3, HCMC"
                      status: "active"
        '400':
          description: Target không phải Staff hoặc facilityIds không hợp lệ
          content:
            application/json:
              example:
                success: false
                message: "Can only assign facilities to Staff users"
        '403':
          description: Manager cố assign facility ngoài phạm vi
          content:
            application/json:
              example:
                success: false
                message: "Manager can only assign facilities they are assigned to. Unauthorized: 683f..."

