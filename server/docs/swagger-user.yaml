openapi: 3.0.0
info:
  title: Smart Parking API - Users
  version: 1.0.0
paths:
  /users:
    get:
      summary: Get all users
      tags: [Users]
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            default: 10
        - in: query
          name: role
          schema:
            type: string
        - in: query
          name: status
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              example:
                success: true
                data:
                  - _id: "60b9b0b9e6b3f3b3b4f3b3b5"
                    name: "Nguyen Van B"
                    email: "nguyenvanb@example.com"
                    phone: "0909876543"
                    role: "staff"
                    status: "active"
                pagination:
                  page: 1
                  limit: 10
                  total: 1
    post:
      summary: Create a user
      tags: [Users]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  example: "Nguyen Van B"
                email:
                  type: string
                  example: "nguyenvanb@example.com"
                phone:
                  type: string
                  example: "0909876543"
                password:
                  type: string
                  example: "smartparking123"
                role:
                  type: string
                  example: "staff"
      responses:
        '201':
          description: Created
          content:
            application/json:
              example:
                success: true
                data:
                  _id: "60b9b0b9e6b3f3b3b4f3b3b5"
                  name: "Nguyen Van B"
                  email: "nguyenvanb@example.com"
                  phone: "0909876543"
                  role: "staff"
                  status: "active"

  /users/{id}:
    get:
      summary: Get user by ID
      tags: [Users]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            example: "60b9b0b9e6b3f3b3b4f3b3b5"
      responses:
        '200':
          description: OK
          content:
            application/json:
              example:
                success: true
                data:
                  _id: "60b9b0b9e6b3f3b3b4f3b3b5"
                  name: "Nguyen Van B"
                  email: "nguyenvanb@example.com"
                  phone: "0909876543"
                  role: "staff"
                  status: "active"
    patch:
      summary: Update user
      tags: [Users]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            example: "60b9b0b9e6b3f3b3b4f3b3b5"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  example: "Nguyen Van B Updated"
                phone:
                  type: string
                  example: "0909876544"
                status:
                  type: string
                  example: "active"
      responses:
        '200':
          description: OK
          content:
            application/json:
              example:
                success: true
                data:
                  _id: "60b9b0b9e6b3f3b3b4f3b3b5"
                  name: "Nguyen Van B Updated"
                  email: "nguyenvanb@example.com"
                  phone: "0909876544"
                  role: "staff"
                  status: "active"

  /users/{id}/lock:
    patch:
      summary: Lock or unlock user account
      tags: [Users]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            example: "60b9b0b9e6b3f3b3b4f3b3b5"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  enum: [active, locked]
                  example: "locked"
      responses:
        '200':
          description: OK
          content:
            application/json:
              example:
                success: true
                message: "User status updated to locked"

  /users/{id}/reset-password:
    patch:
      summary: Reset user password
      tags: [Users]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            example: "60b9b0b9e6b3f3b3b4f3b3b5"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                newPassword:
                  type: string
                  example: "smartparking123"
      responses:
        '200':
          description: OK
          content:
            application/json:
              example:
                success: true
                data: {}
