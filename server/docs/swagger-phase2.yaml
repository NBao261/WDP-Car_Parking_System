openapi: 3.0.0
info:
  title: Smart Parking API - Phase 2
  version: 1.0.0
  description: API endpoints for Floors, Slots, Pricing, Public Access, and SystemConfig
servers:
  - url: http://localhost:5000/api/v1
    description: Local Development Server

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

security:
  - bearerAuth: []

paths:
  # ================= PUBLIC APIs =================
  /public/facilities:
    get:
      summary: Get all active facilities
      tags: [Public]
      security: []
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            default: 10
      responses:
        '200':
          description: OK
          content:
            application/json:
              example:
                success: true
                data: {}

  /public/facilities/{facilityId}/pricing:
    get:
      summary: Get active pricing for a facility
      tags: [Public]
      security: []
      parameters:
        - in: path
          name: facilityId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              example:
                success: true
                data: {}

  /public/facilities/{facilityId}/available-slots:
    get:
      summary: Get available slot counts by vehicle type
      tags: [Public]
      security: []
      parameters:
        - in: path
          name: facilityId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              example:
                success: true
                data: {}

  # ================= FLOORS APIs =================
  /floors:
    get:
      summary: List all floors
      tags: [Floors]
      parameters:
        - in: query
          name: facilityId
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              example:
                success: true
                data: {}
    post:
      summary: Create a new floor
      tags: [Floors]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                facilityId:
                  type: string
                  example: "60b9b0b9e6b3f3b3b4f3b3b4"
                name:
                  type: string
                  example: "Tầng B1"
                status:
                  type: string
                  example: "active"
      responses:
        '201':
          description: Created
          content:
            application/json:
              example:
                success: true
                data: {}

  /floors/{id}:
    get:
      summary: Get floor by ID
      tags: [Floors]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              example:
                success: true
                data: {}
    patch:
      summary: Update floor
      tags: [Floors]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  example: "Tầng B1 (Updated)"
      responses:
        '200':
          description: OK
          content:
            application/json:
              example:
                success: true
                data: {}
    delete:
      summary: Soft delete floor
      tags: [Floors]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              example:
                success: true
                data: {}

  /floors/{id}/assign-vehicles:
    patch:
      summary: Assign allowed vehicle types to floor
      tags: [Floors]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                allowedVehicleTypes:
                  type: array
                  items:
                    type: string
                  example: ["60b9b0b9e6b3f3b3b4f3b3b6", "60b9b0b9e6b3f3b3b4f3b3b7"]
      responses:
        '200':
          description: OK
          content:
            application/json:
              example:
                success: true
                data: {}

  # ================= PARKING SLOTS APIs =================
  /slots:
    post:
      summary: Create a single slot
      tags: [Slots]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                code:
                  type: string
                  example: "A-01"
                floorId:
                  type: string
                  example: "60b9b0b9e6b3f3b3b4f3b3b8"
                facilityId:
                  type: string
                  example: "60b9b0b9e6b3f3b3b4f3b3b4"
                vehicleTypeId:
                  type: string
                  example: "60b9b0b9e6b3f3b3b4f3b3b6"
      responses:
        '201':
          description: Created
          content:
            application/json:
              example:
                success: true
                data: {}

  /slots/bulk:
    post:
      summary: Create slots in bulk
      tags: [Slots]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                facilityId:
                  type: string
                  example: "60b9b0b9e6b3f3b3b4f3b3b4"
                floorId:
                  type: string
                  example: "60b9b0b9e6b3f3b3b4f3b3b8"
                vehicleType:
                  type: string
                  example: "60b9b0b9e6b3f3b3b4f3b3b6"
                prefix:
                  type: string
                  example: "A"
                startNumber:
                  type: integer
                  example: 1
                count:
                  type: integer
                  example: 10
      responses:
        '201':
          description: Created
          content:
            application/json:
              example:
                success: true
                data: {}

  /slots/floor/{floorId}:
    get:
      summary: Get all slots on a floor
      tags: [Slots]
      parameters:
        - in: path
          name: floorId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              example:
                success: true
                data: {}

  /slots/{id}/status:
    patch:
      summary: Update slot status (e.g. maintenance)
      tags: [Slots]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  enum: [available, maintenance, locked]
                  example: "maintenance"
                reason:
                  type: string
                  example: "Sửa chữa cảm biến"
      responses:
        '200':
          description: OK
          content:
            application/json:
              example:
                success: true
                data: {}

  # ================= PRICING APIs =================
  /pricing:
    get:
      summary: List all pricing plans
      tags: [Pricing]
      parameters:
        - in: query
          name: facilityId
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              example:
                success: true
                data: {}
    post:
      summary: Create pricing plan
      tags: [Pricing]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  example: "Xe Máy - Theo giờ"
                vehicleTypeId:
                  type: string
                  example: "60b9b0b9e6b3f3b3b4f3b3b6"
                facilityId:
                  type: string
                  example: "60b9b0b9e6b3f3b3b4f3b3b4"
                feeType:
                  type: string
                  example: "hourly"
                rates:
                  type: array
                  items:
                    type: object
                    properties:
                      label:
                        type: string
                        example: "Giờ đầu"
                      amount:
                        type: number
                        example: 5000
                      unit:
                        type: string
                        example: "VND"
                status:
                  type: string
                  example: "active"
      responses:
        '201':
          description: Created
          content:
            application/json:
              example:
                success: true
                data: {}

  # ================= SYSTEM CONFIG APIs =================
  /config:
    get:
      summary: Get all system configs
      tags: [SystemConfig]
      responses:
        '200':
          description: OK
          content:
            application/json:
              example:
                success: true
                data: {}
  /config/logs:
    get:
      summary: Get audit logs
      tags: [SystemConfig]
      responses:
        '200':
          description: OK
          content:
            application/json:
              example:
                success: true
                data: {}
  /config/{key}:
    get:
      summary: Get specific config
      tags: [SystemConfig]
      parameters:
        - in: path
          name: key
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              example:
                success: true
                data: {}
    put:
      summary: Update specific config
      tags: [SystemConfig]
      parameters:
        - in: path
          name: key
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                value:
                  type: object
                  example: {"timezone": "Asia/Ho_Chi_Minh", "currency": "VND"}
      responses:
        '200':
          description: OK
          content:
            application/json:
              example:
                success: true
                data: {}
