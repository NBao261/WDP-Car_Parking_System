components:
  schemas:
    Exception:
      type: object
      properties:
        _id:
          type: string
          description: Mã ngoại lệ
        sessionId:
          type: string
          description: ID của lượt gửi xe (hoặc object đầy đủ nếu populated)
        type:
          type: string
          enum: [lost_card, wrong_plate, overtime, wrong_zone, unpaid, other]
          description: Loại ngoại lệ
        description:
          type: string
          description: Mô tả chi tiết
        staffId:
          type: string
          description: ID nhân viên báo cáo (hoặc object đầy đủ)
        managerId:
          type: string
          description: ID quản lý đã duyệt (hoặc object đầy đủ)
        managerNote:
          type: string
          description: Ghi chú của quản lý
        surcharge:
          type: number
          description: Phụ phí phạt
        status:
          type: string
          enum: [new, processing, resolved, rejected]
          description: Trạng thái xử lý
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

paths:
  /exceptions:
    get:
      summary: Lấy danh sách ngoại lệ
      tags: [Exceptions]
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            default: 1
          description: Số trang
        - in: query
          name: limit
          schema:
            type: integer
            default: 10
          description: Số lượng / trang
        - in: query
          name: status
          schema:
            type: string
            enum: [new, processing, resolved, rejected]
        - in: query
          name: type
          schema:
            type: string
            enum: [lost_card, wrong_plate, overtime, wrong_zone, unpaid, other]
        - in: query
          name: sessionId
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              example:
                success: true
                data:
                  - _id: "683f1a2b3c4d5e6f7a8b9c20"
                    sessionId:
                      _id: "683f1a2b3c4d5e6f7a8b9c10"
                      code: "PS-20260514-A1B2"
                      licensePlate: "59A-12345"
                    type: "lost_card"
                    description: "Khách làm mất thẻ xe"
                    staffId:
                      _id: "683f1a2b3c4d5e6f7a8b9c99"
                      name: "Staff Nguyen"
                    surcharge: 50000
                    status: "new"
                    createdAt: "2026-05-14T08:00:00.000Z"
                pagination:
                  total: 1
                  page: 1
                  totalPages: 1

    post:
      summary: Tạo ngoại lệ mới (Staff)
      description: 'Tạo một ngoại lệ cho lượt gửi xe. Lưu ý: Khi tạo ngoại lệ loại `lost_card` hoặc `wrong_plate`, hệ thống sẽ tự động khoá lượt gửi xe (chuyển sang trạng thái `EXCEPTION`) và chặn checkout cho đến khi Manager giải quyết.'
      tags: [Exceptions]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - sessionId
                - type
                - description
              properties:
                sessionId:
                  type: string
                  example: "683f1a2b3c4d5e6f7a8b9c10"
                type:
                  type: string
                  enum: [lost_card, wrong_plate, overtime, wrong_zone, unpaid, other]
                  example: "lost_card"
                description:
                  type: string
                  example: "Khách làm mất thẻ xe"
                surcharge:
                  type: number
                  example: 50000
            example:
              sessionId: "683f1a2b3c4d5e6f7a8b9c10"
              type: "lost_card"
              description: "Khách làm mất thẻ xe"
              surcharge: 50000
      responses:
        '201':
          description: Tạo ngoại lệ thành công
          content:
            application/json:
              example:
                success: true
                data:
                  _id: "683f1a2b3c4d5e6f7a8b9c20"
                  sessionId: "683f1a2b3c4d5e6f7a8b9c10"
                  type: "lost_card"
                  description: "Khách làm mất thẻ xe"
                  staffId: "683f1a2b3c4d5e6f7a8b9c99"
                  surcharge: 50000
                  status: "new"
                  createdAt: "2026-05-14T08:00:00.000Z"

  /exceptions/{id}/resolve:
    patch:
      summary: Duyệt / Xử lý ngoại lệ (Manager)
      description: 'Manager duyệt và xử lý ngoại lệ. <br> - Với `wrong_plate`, **bắt buộc** truyền `newLicensePlate`. <br> - Với `wrong_zone`, **bắt buộc** truyền `newSlotId`. Slot mới phải là `AVAILABLE` hoặc `LOCKED` và đúng loại xe. Slot cũ của xe sẽ bị khóa (`LOCKED`). <br> - Khi resolve thành công `lost_card` hoặc `wrong_plate`, hệ thống sẽ mở khóa session về lại `ACTIVE` để cho phép checkout.'
      tags: [Exceptions]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            example: "683f1a2b3c4d5e6f7a8b9c20"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - status
              properties:
                status:
                  type: string
                  enum: [resolved, rejected]
                  example: "resolved"
                managerNote:
                  type: string
                  example: "Đã thu phụ phí 50,000 VND"
                newLicensePlate:
                  type: string
                  description: 'Biển số mới (**bắt buộc** nếu type = wrong_plate)'
                  example: "59A-99999"
                newSlotId:
                  type: string
                  description: 'ID slot thực tế mới (**bắt buộc** nếu type = wrong_zone). Slot mới này phải đang `AVAILABLE` hoặc `LOCKED`.'
                  example: "683f1a2b3c4d5e6f7a8b9c03"
            example:
              status: "resolved"
              managerNote: "Đã thu phụ phí 50,000 VND"
      responses:
        '200':
          description: Xử lý ngoại lệ thành công
          content:
            application/json:
              example:
                success: true
                data:
                  _id: "683f1a2b3c4d5e6f7a8b9c20"
                  type: "lost_card"
                  status: "resolved"
                  managerNote: "Đã thu phụ phí 50,000 VND"
                  managerId: "683f1a2b3c4d5e6f7a8b9c88"
                  surcharge: 50000
        '404':
          description: Không tìm thấy ngoại lệ
          content:
            application/json:
              example:
                success: false
                message: "Exception không tồn tại"

  /exceptions/detect-overdue:
    post:
      summary: Kích hoạt quét tự động xe quá hạn (Admin/System)
      description: |
        Quét toàn bộ session active để phát hiện xe quá hạn (vượt quá 24h).
        Tự động tạo exception với type = "overtime" cho các session vi phạm.
      tags: [Exceptions]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Quét hoàn tất
          content:
            application/json:
              example:
                success: true
                message: "Đã quét và phát hiện 3 lượt gửi xe quá hạn."
                data:
                  count: 3
